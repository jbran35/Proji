services:
  #The SQL Server Database
  proji-sql:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: proji-sql-dev
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=SuperSecret123!
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql

  #The Redis Cache
  proji-redis:
    image: redis:latest
    container_name: proji-redis-dev
    ports:
      - "6379:6379"

# Define the persistent volume for the database
volumes:
  sql-data: